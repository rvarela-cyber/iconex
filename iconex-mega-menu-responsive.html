<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iconex – Responsive Mega Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Barlow',sans-serif;background:#c8cede;min-height:100vh;}
.bar{background:#1a2340;padding:12px 24px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:9999;}
.blbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:1px;text-transform:uppercase;margin-right:4px;}
.bp{padding:7px 20px;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.6);font-family:'Barlow',sans-serif;transition:all .15s;}
.bp:hover{border-color:#fff;color:#fff;}
.bp.on{background:#fff;color:#1a2340;border-color:#fff;}
.dlbl{font-size:12px;color:rgba(255,255,255,.35);margin-left:8px;}
.stage{display:flex;justify-content:center;align-items:flex-start;padding:32px 24px;min-height:calc(100vh - 53px);}
.device{background:#fff;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;transition:max-width .3s ease;width:100%;max-width:768px;}
iframe{display:block;width:100%;border:none;height:600px;}
</style>
</head>
<body>
<div class="bar">
  <span class="blbl">Preview</span>
  <button class="bp on" onclick="setDev('tablet',this,'Tablet · 768px')">Tablet</button>
  <button class="bp" onclick="setDev('mobile',this,'Mobile · 390px')">Mobile</button>
  <span class="dlbl" id="dlbl">Tablet · 768px</span>
</div>
<div class="stage">
  <div class="device" id="dev">
    <iframe id="frm" srcdoc="&lt;!DOCTYPE html&gt;
&lt;html lang=&quot;en&quot;&gt;
&lt;head&gt;
&lt;meta charset=&quot;UTF-8&quot;&gt;
&lt;meta name=&quot;viewport&quot; content=&quot;width=device-width, initial-scale=1.0&quot;&gt;
&lt;link href=&quot;https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&amp;display=swap&quot; rel=&quot;stylesheet&quot;&gt;
&lt;style&gt;
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--navy:#0032a0;--gray-50:#f8f9fb;--gray-100:#f0f2f7;--gray-200:#e2e6ef;--gray-400:#8d97b0;--gray-700:#3a4560;--blue:#0046cc;}
html,body{height:100%;overflow:hidden;font-family:&#x27;Barlow&#x27;,sans-serif;background:#fff;}

/* NAV */
.nav{background:#fff;border-bottom:1px solid var(--gray-200);position:relative;z-index:200;height:56px;display:flex;align-items:center;padding:0 20px;gap:6px;}
.nav-logo{height:28px;width:auto;flex-shrink:0;}
.spacer{flex:1;}
.nav-links{display:flex;align-items:center;gap:2px;}
.nbtn{display:flex;align-items:center;gap:4px;padding:6px 10px;font-size:12px;font-weight:600;color:var(--gray-700);cursor:pointer;border:none;background:none;border-radius:4px;font-family:&#x27;Barlow&#x27;,sans-serif;white-space:nowrap;}
.nbtn:hover{background:var(--gray-100);color:var(--navy);}
.ch{font-size:9px;color:#000;transition:transform .2s;}
.ch.flipped{transform:rotate(180deg);}
.clnk{font-size:12px;font-weight:600;color:#000;text-decoration:none;padding:6px 10px;}
.hbg{display:none;flex-direction:column;justify-content:center;align-items:center;gap:5px;width:36px;height:36px;cursor:pointer;border:none;background:none;margin-left:auto;}
.hbg span{display:block;width:22px;height:2px;background:#1a2340;border-radius:2px;transition:transform .3s,opacity .3s;}
.hbg.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.hbg.open span:nth-child(2){opacity:0;}
.hbg.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

/* BODY */
.body{position:relative;height:calc(100vh - 56px);overflow:hidden;background:var(--gray-50);}
.hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.hint p{font-size:12px;color:var(--gray-400);font-weight:600;text-align:center;padding:20px;}

/* MEGA */
.mega{display:none;position:absolute;top:0;left:0;right:0;background:#fff;border-top:3px solid var(--navy);border-bottom:1px solid var(--gray-200);box-shadow:0 8px 24px rgba(0,25,90,.12);z-index:100;}
.mega.show{display:flex;}
.ml{width:190px;flex-shrink:0;background:var(--gray-50);border-right:1px solid var(--gray-200);padding:10px 0;}
.ind{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;border-left:3px solid transparent;}
.ind:hover{background:var(--gray-100);}
.ind.on{background:#fff;border-left-color:var(--navy);}
.il{font-size:12px;font-weight:500;color:var(--gray-700);line-height:1.3;}
.ind.on .il{color:var(--navy);font-weight:700;}
.ia{font-size:10px;color:var(--gray-400);opacity:0;}
.ind.on .ia{opacity:1;color:var(--navy);}
.mr{flex:1;overflow-y:auto;max-height:420px;padding:18px 22px;scrollbar-width:none;}
.mr::-webkit-scrollbar{display:none;}
.pnl{display:none;}
.pnl.on{display:block;}
.ptitle{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--gray-100);}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:14px 24px;}
.sn{font-size:11px;font-weight:700;color:var(--gray-700);margin-bottom:6px;}
.pl{list-style:none;}
.pl a{display:block;padding:3px 0;font-size:12px;color:var(--blue);text-decoration:none;line-height:1.4;}
.pl a:hover{color:var(--navy);text-decoration:underline;}

/* DRAWER */
.ov{display:none;position:absolute;inset:0;background:rgba(0,15,60,.2);z-index:149;}
.ov.show{display:block;}
.drawer{position:absolute;top:0;left:0;width:100%;height:100%;background:#fff;z-index:150;overflow-y:auto;transform:translateX(-100%);transition:transform .3s;scrollbar-width:none;}
.drawer::-webkit-scrollbar{display:none;}
.drawer.show{transform:translateX(0);}
.dsec{border-bottom:1px solid var(--gray-100);}
.dtop{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;font-size:13px;font-weight:600;color:var(--gray-700);cursor:pointer;}
.dtop:hover{color:var(--navy);}
.dtop .dc{font-size:9px;color:#888;transition:transform .2s;}
.dtop.open .dc{transform:rotate(180deg);}
.dprods{display:none;background:var(--gray-50);}
.dprods.open{display:block;}
.dind{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 10px 22px;cursor:pointer;border-left:3px solid transparent;font-size:12px;font-weight:500;color:var(--gray-700);}
.dind:hover{background:var(--gray-100);}
.dind.open{border-left-color:var(--navy);color:var(--navy);font-weight:700;background:#fff;}
.dind .dc{font-size:9px;color:#aaa;transition:transform .2s;}
.dind.open .dc{transform:rotate(180deg);}
.dsols{display:none;background:#fff;padding:4px 0 12px 28px;}
.dsols.open{display:block;}
.dsn{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-400);padding:14px 12px 4px;}
.dpl{display:block;padding:5px 12px;font-size:12px;color:var(--blue);text-decoration:none;}
.dpl:hover{color:var(--navy);text-decoration:underline;}
.dplnk{display:block;padding:13px 16px;font-size:13px;font-weight:600;color:var(--gray-700);text-decoration:none;}
.dplnk:hover{color:var(--navy);}

/* MODES */
body.mobile .nav-links{display:none;}
body.mobile .clnk{display:none;}
body.mobile .hbg{display:flex;}
body.mobile .mega{display:none !important;}
body.desktop .hbg{display:none;}
&lt;/style&gt;
&lt;/head&gt;
